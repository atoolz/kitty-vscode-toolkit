# Valid entries (should NOT produce diagnostics)
font_family monospace
font_size 12.0
cursor_shape block
enable_audio_bell yes
foreground #dddddd
background #000000
tab_bar_style powerline
scrollback_lines 5000

# Valid directives
map ctrl+shift+c copy_to_clipboard
include theme.conf
globinclude *.conf
env MY_VAR=hello
