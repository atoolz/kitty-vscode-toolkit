fake_option value
not_a_real_setting 42

# Invalid boolean values
enable_audio_bell maybe
detect_urls 1
sync_to_monitor true
force_ltr false

# Invalid number values
font_size big
repaint_delay fast
scrollback_lines lots

# Invalid enum values
cursor_shape triangle
