<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1a1200"/>
      <stop offset="100%" stop-color="#2d2000"/>
    </linearGradient>
    <linearGradient id="iconGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f59e0b"/>
      <stop offset="100%" stop-color="#d97706"/>
    </linearGradient>
    <linearGradient id="accentOrb" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f59e0b" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#f59e0b" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="accentOrb2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#fbbf24" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#d97706" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Subtle grid dots -->
  <g opacity="0.06">
    <pattern id="dots" x="0" y="0" width="40" height="40" patternUnits="userSpaceOnUse">
      <circle cx="20" cy="20" r="1" fill="#94a3b8"/>
    </pattern>
    <rect width="1200" height="630" fill="url(#dots)"/>
  </g>

  <!-- Decorative gradient orbs -->
  <circle cx="200" cy="300" r="250" fill="url(#accentOrb)"/>
  <circle cx="1000" cy="500" r="300" fill="url(#accentOrb2)"/>

  <!-- Top accent line -->
  <rect x="0" y="0" width="1200" height="3" fill="#f59e0b" opacity="0.6"/>

  <!-- Icon -->
  <g transform="translate(80, 180)">
    <rect width="100" height="100" rx="20" fill="url(#iconGrad)"/>
    <rect x="1" y="1" width="98" height="98" rx="19" fill="none" stroke="#fbbf24" stroke-width="1.5" opacity="0.3"/>
    <text x="50" y="50" text-anchor="middle" dominant-baseline="central" font-family="'Inter', 'Helvetica Neue', Arial, sans-serif" font-size="42" font-weight="700" fill="#ffffff" letter-spacing="-1.5">Kt</text>
  </g>

  <!-- Title -->
  <text x="210" y="215" font-family="'Inter', 'Helvetica Neue', Arial, sans-serif" font-size="48" font-weight="800" fill="#ffffff" letter-spacing="-1">Kitty Toolkit</text>

  <!-- Subtitle -->
  <text x="210" y="258" font-family="'Inter', 'Helvetica Neue', Arial, sans-serif" font-size="22" font-weight="400" fill="#94a3b8">for VS Code</text>

  <!-- Divider line -->
  <rect x="80" y="310" width="500" height="1" fill="#334155" opacity="0.8"/>

  <!-- Feature list -->
  <g font-family="'Inter', 'Helvetica Neue', Arial, sans-serif" font-size="19" fill="#e2e8f0">
    <circle cx="100" cy="352" r="4" fill="#f59e0b"/>
    <text x="120" y="358">Syntax highlighting</text>

    <circle cx="100" cy="392" r="4" fill="#f59e0b"/>
    <text x="120" y="398">100+ config options</text>

    <circle cx="100" cy="432" r="4" fill="#f59e0b"/>
    <text x="120" y="438">Enum &amp; color validation</text>

    <circle cx="100" cy="472" r="4" fill="#f59e0b"/>
    <text x="120" y="478">Map action completions</text>

    <circle cx="100" cy="512" r="4" fill="#f59e0b"/>
    <text x="120" y="518">6 ready-to-use snippets</text>
  </g>

  <!-- Right side decorative code block -->
  <g transform="translate(660, 140)" opacity="0.9">
    <rect width="460" height="340" rx="12" fill="#1a1200" stroke="#334155" stroke-width="1"/>
    <!-- Window dots -->
    <circle cx="24" cy="20" r="5" fill="#ef4444" opacity="0.7"/>
    <circle cx="44" cy="20" r="5" fill="#eab308" opacity="0.7"/>
    <circle cx="64" cy="20" r="5" fill="#22c55e" opacity="0.7"/>
    <!-- Code lines -->
    <g font-family="'Fira Code', 'Cascadia Code', 'Consolas', monospace" font-size="15">
      <text x="24" y="55" fill="#64748b"># Kitty Terminal</text>
      <text x="24" y="80" fill="#c084fc">font_family</text><text x="130" y="80" fill="#e2e8f0">      FiraCode Nerd Font</text>
      <text x="24" y="105" fill="#c084fc">font_size</text><text x="112" y="105" fill="#e2e8f0">        </text><text x="180" y="105" fill="#fbbf24">12.0</text>
      <text x="24" y="130" fill="#c084fc">cursor_shape</text><text x="140" y="130" fill="#e2e8f0">     </text><text x="180" y="130" fill="#86efac">beam</text>
      <text x="24" y="155" fill="#c084fc">background</text><text x="122" y="155" fill="#e2e8f0">       </text><text x="180" y="155" fill="#86efac">#1a1b26</text>
      <text x="24" y="180" fill="#c084fc">foreground</text><text x="122" y="180" fill="#e2e8f0">       </text><text x="180" y="180" fill="#86efac">#c0caf5</text>
      <text x="24" y="205" fill="#c084fc">tab_bar_style</text><text x="146" y="205" fill="#e2e8f0">    </text><text x="180" y="205" fill="#86efac">powerline</text>
      <text x="24" y="230" fill="#c084fc">map</text><text x="50" y="230" fill="#7dd3fc"> ctrl+shift+c</text><text x="170" y="230" fill="#e2e8f0"> </text><text x="180" y="230" fill="#86efac">copy_to_clipboard</text>
    </g>
    <!-- Autocomplete popup -->
    <g transform="translate(180, 110)">
      <rect width="220" height="110" rx="6" fill="#1e293b" stroke="#f59e0b" stroke-width="1.5"/>
      <rect x="4" y="6" width="212" height="26" rx="4" fill="#f59e0b" opacity="0.2"/>
      <g font-family="'Fira Code', 'Cascadia Code', 'Consolas', monospace" font-size="13" fill="#e2e8f0">
        <text x="12" y="24" fill="#ffffff" font-weight="600">block</text><text x="60" y="24" fill="#64748b" font-size="11">block cursor</text>
        <text x="12" y="50">beam</text><text x="52" y="50" fill="#64748b" font-size="11">beam cursor</text>
        <text x="12" y="76">underline</text><text x="90" y="76" fill="#64748b" font-size="11">underline cursor</text>
      </g>
    </g>
  </g>

  <!-- Bottom bar -->
  <rect x="0" y="580" width="1200" height="50" fill="#1a1200" opacity="0.7"/>
  <text x="600" y="610" text-anchor="middle" font-family="'Fira Code', 'Cascadia Code', 'Consolas', monospace" font-size="15" fill="#64748b">github.com/atoolz/kitty-vscode-toolkit</text>

  <!-- VS Code badge -->
  <g transform="translate(1020, 590)">
    <rect x="0" y="-12" width="120" height="28" rx="14" fill="#f59e0b" opacity="0.15"/>
    <text x="60" y="6" text-anchor="middle" font-family="'Inter', 'Helvetica Neue', Arial, sans-serif" font-size="12" font-weight="600" fill="#fbbf24">VS Code</text>
  </g>
</svg>