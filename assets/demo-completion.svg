<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="800" height="500">
  <defs>
    <filter id="dropShadow">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#000" flood-opacity="0.4"/>
    </filter>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="800" height="500" rx="8" fill="#1e1e1e"/>

  <!-- Title bar -->
  <rect width="800" height="32" rx="8" fill="#323233"/>
  <rect y="24" width="800" height="8" fill="#323233"/>
  <!-- Traffic lights -->
  <circle cx="20" cy="16" r="6" fill="#ff5f57"/>
  <circle cx="40" cy="16" r="6" fill="#febc2e"/>
  <circle cx="60" cy="16" r="6" fill="#28c840"/>
  <!-- Tab -->
  <rect x="90" y="4" width="130" height="26" fill="#1e1e1e" rx="4"/>
  <text x="102" y="21" font-family="'Cascadia Code', 'Fira Code', Consolas, monospace" font-size="12" fill="#cccccc">kitty.conf</text>

  <!-- Breadcrumb bar -->
  <rect y="32" width="800" height="22" fill="#252526"/>
  <text x="50" y="47" font-family="'Cascadia Code', 'Fira Code', Consolas, monospace" font-size="11" fill="#888">kitty.conf</text>

  <!-- Line numbers gutter -->
  <rect x="0" y="54" width="40" height="446" fill="#1e1e1e"/>

  <!-- Code content -->
  <g font-family="'Cascadia Code', 'Fira Code', Consolas, monospace" font-size="14">
    <!-- Line 1: comment -->
    <text x="14" y="78" fill="#555">1</text>
    <text x="50" y="78" fill="#6a9955"># Font Configuration</text>

    <!-- Line 2: blank -->
    <text x="14" y="100" fill="#555">2</text>

    <!-- Line 3: font_family -->
    <text x="14" y="122" fill="#555">3</text>
    <text x="50" y="122" fill="#569cd6">font_family</text>
    <text x="142" y="122" fill="#ce9178">      FiraCode Nerd Font</text>

    <!-- Line 4: bold_font -->
    <text x="14" y="144" fill="#555">4</text>
    <text x="50" y="144" fill="#569cd6">bold_font</text>
    <text x="126" y="144" fill="#ce9178">        auto</text>

    <!-- Line 5: blank -->
    <text x="14" y="166" fill="#555">5</text>

    <!-- Line 6: typing font_ with cursor -->
    <text x="14" y="188" fill="#555">6</text>
    <text x="50" y="188" fill="#569cd6">font_</text>
    <!-- Blinking cursor -->
    <rect x="92" y="175" width="2" height="17" fill="#f59e0b">
      <animate attributeName="opacity" values="1;0;1" dur="1.2s" repeatCount="indefinite"/>
    </rect>

    <!-- Line 7 -->
    <text x="14" y="210" fill="#555">7</text>

    <!-- Line 8: comment -->
    <text x="14" y="232" fill="#555">8</text>
    <text x="50" y="232" fill="#6a9955"># Cursor</text>

    <!-- Line 9 -->
    <text x="14" y="254" fill="#555">9</text>
    <text x="50" y="254" fill="#569cd6">cursor_shape</text>
    <text x="152" y="254" fill="#ce9178">    beam</text>

    <!-- Line 10 -->
    <text x="10" y="276" fill="#555">10</text>
    <text x="50" y="276" fill="#569cd6">cursor_blink_interval</text>
    <text x="224" y="276" fill="#b5cea8"> -1</text>

    <!-- Line 11 -->
    <text x="10" y="298" fill="#555">11</text>
  </g>

  <!-- Completion dropdown -->
  <g filter="url(#dropShadow)">
    <rect x="48" y="194" width="340" height="200" rx="4" fill="#252526" stroke="#454545" stroke-width="1"/>

    <g font-family="'Cascadia Code', 'Fira Code', Consolas, monospace" font-size="13">
      <!-- Selected item -->
      <rect x="50" y="196" width="336" height="24" fill="#094771" rx="2"/>
      <text x="70" y="213" fill="#f59e0b">&#9638;</text>
      <text x="90" y="213" fill="#ffffff">font_family</text>
      <text x="250" y="213" fill="#888" font-size="10">Font family name</text>

      <!-- Item 2 -->
      <text x="70" y="237" fill="#569cd6">&#9638;</text>
      <text x="90" y="237" fill="#cccccc">font_size</text>
      <text x="250" y="237" fill="#888" font-size="10">Font size in pts</text>

      <!-- Item 3 -->
      <text x="70" y="261" fill="#569cd6">&#9638;</text>
      <text x="90" y="261" fill="#cccccc">bold_font</text>
      <text x="250" y="261" fill="#888" font-size="10">Bold font override</text>

      <!-- Item 4 -->
      <text x="70" y="285" fill="#569cd6">&#9638;</text>
      <text x="90" y="285" fill="#cccccc">italic_font</text>
      <text x="250" y="285" fill="#888" font-size="10">Italic font override</text>

      <!-- Item 5 -->
      <text x="70" y="309" fill="#569cd6">&#9638;</text>
      <text x="90" y="309" fill="#cccccc">bold_italic_font</text>
      <text x="250" y="309" fill="#888" font-size="10">Bold italic override</text>

      <!-- Item 6 -->
      <text x="70" y="333" fill="#569cd6">&#9638;</text>
      <text x="90" y="333" fill="#cccccc">font_features</text>
      <text x="250" y="333" fill="#888" font-size="10">OpenType features</text>

      <!-- Item 7 -->
      <text x="70" y="357" fill="#569cd6">&#9638;</text>
      <text x="90" y="357" fill="#cccccc">disable_ligatures</text>
      <text x="250" y="357" fill="#888" font-size="10">Ligature control</text>

      <!-- Item 8 -->
      <text x="70" y="381" fill="#569cd6">&#9638;</text>
      <text x="90" y="381" fill="#cccccc">modify_font</text>
      <text x="250" y="381" fill="#888" font-size="10">Font metric tweaks</text>
    </g>
  </g>

  <!-- Detail panel on right of completion -->
  <g filter="url(#dropShadow)">
    <rect x="392" y="194" width="350" height="90" rx="4" fill="#252526" stroke="#454545" stroke-width="1"/>
    <g font-family="'Inter', 'Helvetica Neue', Arial, sans-serif" font-size="12">
      <text x="408" y="216" fill="#569cd6" font-weight="600">font_family</text>
      <text x="500" y="216" fill="#888">string</text>
      <rect x="392" y="224" width="350" height="1" fill="#454545"/>
      <text x="408" y="244" fill="#cccccc">A font family name or a font pattern for the main</text>
      <text x="408" y="260" fill="#cccccc">font used in kitty.</text>
      <text x="408" y="278" fill="#888">Default: </text>
      <text x="466" y="278" fill="#ce9178">monospace</text>
    </g>
  </g>

  <!-- Status bar -->
  <rect y="478" width="800" height="22" fill="#007acc"/>
  <text x="12" y="493" font-family="'Cascadia Code', 'Fira Code', Consolas, monospace" font-size="11" fill="#ffffff">Kitty Config</text>
  <text x="700" y="493" font-family="'Cascadia Code', 'Fira Code', Consolas, monospace" font-size="11" fill="#ffffff">Ln 6, Col 6</text>
</svg>
