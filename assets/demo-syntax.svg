<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="800" height="500">
  <defs>
    <filter id="dropShadow">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#000" flood-opacity="0.4"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="800" height="500" rx="8" fill="#1e1e1e"/>

  <!-- Title bar -->
  <rect width="800" height="32" rx="8" fill="#323233"/>
  <rect y="24" width="800" height="8" fill="#323233"/>
  <circle cx="20" cy="16" r="6" fill="#ff5f57"/>
  <circle cx="40" cy="16" r="6" fill="#febc2e"/>
  <circle cx="60" cy="16" r="6" fill="#28c840"/>
  <rect x="90" y="4" width="130" height="26" fill="#1e1e1e" rx="4"/>
  <text x="102" y="21" font-family="'Cascadia Code', 'Fira Code', Consolas, monospace" font-size="12" fill="#cccccc">kitty.conf</text>

  <!-- Breadcrumb bar -->
  <rect y="32" width="800" height="22" fill="#252526"/>
  <text x="50" y="47" font-family="'Cascadia Code', 'Fira Code', Consolas, monospace" font-size="11" fill="#888">~/.config/kitty/kitty.conf</text>

  <!-- Line numbers gutter -->
  <rect x="0" y="54" width="40" height="424" fill="#1e1e1e"/>

  <!-- Code content -->
  <g font-family="'Cascadia Code', 'Fira Code', Consolas, monospace" font-size="13">

    <!-- Line 1: comment -->
    <text x="14" y="78" fill="#555">1</text>
    <text x="50" y="78" fill="#6a9955"># Kitty Terminal Configuration</text>

    <!-- Line 2: blank -->
    <text x="14" y="98" fill="#555">2</text>

    <!-- Line 3: include directive -->
    <text x="14" y="118" fill="#555">3</text>
    <text x="50" y="118" fill="#c586c0">include</text>
    <text x="110" y="118" fill="#ce9178"> themes/tokyo-night.conf</text>

    <!-- Line 4: blank -->
    <text x="14" y="138" fill="#555">4</text>

    <!-- Line 5: comment -->
    <text x="14" y="158" fill="#555">5</text>
    <text x="50" y="158" fill="#6a9955"># Fonts</text>

    <!-- Line 6: font_family -->
    <text x="14" y="178" fill="#555">6</text>
    <text x="50" y="178" fill="#569cd6">font_family</text>
    <text x="142" y="178" fill="#ce9178">      FiraCode Nerd Font</text>

    <!-- Line 7: font_size with number -->
    <text x="14" y="198" fill="#555">7</text>
    <text x="50" y="198" fill="#569cd6">font_size</text>
    <text x="126" y="198" fill="#b5cea8">        12.0</text>

    <!-- Line 8: boolean -->
    <text x="14" y="218" fill="#555">8</text>
    <text x="50" y="218" fill="#569cd6">disable_ligatures</text>
    <text x="194" y="218" fill="#569cd6"> never</text>

    <!-- Line 9: blank -->
    <text x="14" y="238" fill="#555">9</text>

    <!-- Line 10: comment -->
    <text x="10" y="258" fill="#555">10</text>
    <text x="50" y="258" fill="#6a9955"># Colors</text>

    <!-- Line 11: foreground with hex color -->
    <text x="10" y="278" fill="#555">11</text>
    <text x="50" y="278" fill="#569cd6">foreground</text>
    <rect x="182" y="266" width="12" height="12" rx="2" fill="#dddddd" stroke="#555" stroke-width="0.5"/>
    <text x="198" y="278" fill="#ce9178">#dddddd</text>

    <!-- Line 12: background with hex color -->
    <text x="10" y="298" fill="#555">12</text>
    <text x="50" y="298" fill="#569cd6">background</text>
    <rect x="182" y="286" width="12" height="12" rx="2" fill="#1a1b26" stroke="#555" stroke-width="0.5"/>
    <text x="198" y="298" fill="#ce9178">#1a1b26</text>

    <!-- Line 13: background_opacity -->
    <text x="10" y="318" fill="#555">13</text>
    <text x="50" y="318" fill="#569cd6">background_opacity</text>
    <text x="200" y="318" fill="#b5cea8"> 0.95</text>

    <!-- Line 14: blank -->
    <text x="10" y="338" fill="#555">14</text>

    <!-- Line 15: comment -->
    <text x="10" y="358" fill="#555">15</text>
    <text x="50" y="358" fill="#6a9955"># Keybindings</text>

    <!-- Line 16: map directive -->
    <text x="10" y="378" fill="#555">16</text>
    <text x="50" y="378" fill="#c586c0">map</text>
    <text x="78" y="378" fill="#9cdcfe"> ctrl+shift+c</text>
    <text x="190" y="378" fill="#dcdcaa"> copy_to_clipboard</text>

    <!-- Line 17: map directive -->
    <text x="10" y="398" fill="#555">17</text>
    <text x="50" y="398" fill="#c586c0">map</text>
    <text x="78" y="398" fill="#9cdcfe"> ctrl+shift+v</text>
    <text x="190" y="398" fill="#dcdcaa"> paste_from_clipboard</text>

    <!-- Line 18: blank -->
    <text x="10" y="418" fill="#555">18</text>

    <!-- Line 19: env directive -->
    <text x="10" y="438" fill="#555">19</text>
    <text x="50" y="438" fill="#c586c0">env</text>
    <text x="78" y="438" fill="#9cdcfe"> TERM_PROGRAM</text>
    <text x="190" y="438" fill="#d4d4d4">=</text>
    <text x="198" y="438" fill="#ce9178">kitty</text>

    <!-- Line 20: mouse_map -->
    <text x="10" y="458" fill="#555">20</text>
    <text x="50" y="458" fill="#c586c0">mouse_map</text>
    <text x="126" y="458" fill="#9cdcfe"> left</text>
    <text x="160" y="458" fill="#d4d4d4"> click</text>
    <text x="202" y="458" fill="#d4d4d4"> ungrabbed</text>
    <text x="286" y="458" fill="#dcdcaa"> mouse_handle_click</text>
  </g>

  <!-- Status bar -->
  <rect y="478" width="800" height="22" fill="#007acc"/>
  <text x="12" y="493" font-family="'Cascadia Code', 'Fira Code', Consolas, monospace" font-size="11" fill="#ffffff">Kitty Config</text>
  <text x="350" y="493" font-family="'Cascadia Code', 'Fira Code', Consolas, monospace" font-size="11" fill="#ffffff">UTF-8</text>
  <text x="700" y="493" font-family="'Cascadia Code', 'Fira Code', Consolas, monospace" font-size="11" fill="#ffffff">Ln 1, Col 1</text>
</svg>
