<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 350" width="800" height="350">
  <defs>
    <filter id="dropShadow">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#000" flood-opacity="0.4"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="800" height="350" rx="8" fill="#1e1e1e"/>

  <!-- Title bar -->
  <rect width="800" height="32" rx="8" fill="#323233"/>
  <rect y="24" width="800" height="8" fill="#323233"/>
  <circle cx="20" cy="16" r="6" fill="#ff5f57"/>
  <circle cx="40" cy="16" r="6" fill="#febc2e"/>
  <circle cx="60" cy="16" r="6" fill="#28c840"/>
  <rect x="90" y="4" width="130" height="26" fill="#1e1e1e" rx="4"/>
  <text x="102" y="21" font-family="'Cascadia Code', 'Fira Code', Consolas, monospace" font-size="12" fill="#cccccc">kitty.conf</text>

  <!-- Line numbers gutter -->
  <rect x="0" y="32" width="40" height="274" fill="#1e1e1e"/>

  <!-- Code content -->
  <g font-family="'Cascadia Code', 'Fira Code', Consolas, monospace" font-size="14">
    <!-- Line 1: comment -->
    <text x="14" y="62" fill="#555">1</text>
    <text x="50" y="62" fill="#6a9955"># My kitty config</text>

    <!-- Line 2: blank -->
    <text x="14" y="84" fill="#555">2</text>

    <!-- Line 3: valid line -->
    <text x="14" y="106" fill="#555">3</text>
    <text x="50" y="106" fill="#569cd6">font_family</text>
    <text x="142" y="106" fill="#ce9178">      monospace</text>

    <!-- Line 4: unknown key - error -->
    <text x="14" y="128" fill="#555">4</text>
    <text x="50" y="128" fill="#f14c4c">fonnt_size</text>
    <!-- Red wavy underline -->
    <g fill="none" stroke="#f14c4c" stroke-width="1.2" opacity="0.9">
      <path d="M50,133 l3,-3 l3,3 l3,-3 l3,3 l3,-3 l3,3 l3,-3 l3,3 l3,-3 l3,3 l3,-3 l3,3 l3,-3"/>
    </g>
    <text x="134" y="128" fill="#b5cea8">        12.0</text>
    <!-- Error gutter icon -->
    <circle cx="6" cy="125" r="4" fill="#f14c4c" opacity="0.8"/>

    <!-- Line 5: blank -->
    <text x="14" y="150" fill="#555">5</text>

    <!-- Line 6: valid key, invalid value - warning -->
    <text x="14" y="172" fill="#555">6</text>
    <text x="50" y="172" fill="#569cd6">cursor_shape</text>
    <text x="156" y="172" fill="#cca700">    rectangle</text>
    <!-- Yellow wavy underline on value -->
    <g fill="none" stroke="#cca700" stroke-width="1.2" opacity="0.9">
      <path d="M196,177 l3,-3 l3,3 l3,-3 l3,3 l3,-3 l3,3 l3,-3 l3,3 l3,-3 l3,3 l3,-3 l3,3 l3,-3 l3,3"/>
    </g>
    <!-- Warning gutter icon -->
    <text x="2" y="176" fill="#cca700" font-size="10">&#9888;</text>

    <!-- Line 7: blank -->
    <text x="14" y="194" fill="#555">7</text>

    <!-- Line 8: invalid color -->
    <text x="14" y="216" fill="#555">8</text>
    <text x="50" y="216" fill="#569cd6">foreground</text>
    <text x="134" y="216" fill="#f14c4c">      #xyz123</text>
    <!-- Red wavy underline on invalid hex -->
    <g fill="none" stroke="#f14c4c" stroke-width="1.2" opacity="0.9">
      <path d="M182,221 l3,-3 l3,3 l3,-3 l3,3 l3,-3 l3,3 l3,-3 l3,3 l3,-3 l3,3 l3,-3 l3,3"/>
    </g>
    <circle cx="6" cy="213" r="4" fill="#f14c4c" opacity="0.8"/>

    <!-- Line 9: valid -->
    <text x="14" y="238" fill="#555">9</text>
    <text x="50" y="238" fill="#569cd6">background</text>
    <text x="134" y="238" fill="#d4d4d4">      </text>
    <rect x="182" y="226" width="12" height="12" rx="2" fill="#1a1a2e" stroke="#555" stroke-width="0.5"/>
    <text x="198" y="238" fill="#ce9178">#1a1a2e</text>
  </g>

  <!-- Problems panel at bottom -->
  <rect x="0" y="254" width="800" height="74" fill="#1e1e1e" stroke="#454545" stroke-width="1"/>
  <rect x="0" y="254" width="800" height="22" fill="#252526"/>
  <text x="12" y="269" font-family="'Inter', 'Helvetica Neue', Arial, sans-serif" font-size="12" fill="#cccccc" font-weight="600">PROBLEMS</text>
  <text x="90" y="269" font-family="'Inter', 'Helvetica Neue', Arial, sans-serif" font-size="11" fill="#f14c4c">2 errors</text>
  <text x="148" y="269" font-family="'Inter', 'Helvetica Neue', Arial, sans-serif" font-size="11" fill="#cca700">1 warning</text>

  <g font-family="'Cascadia Code', 'Fira Code', Consolas, monospace" font-size="12">
    <circle cx="20" cy="287" r="4" fill="#f14c4c"/>
    <text x="30" y="291" fill="#cccccc">Unknown option "fonnt_size". Did you mean "font_size"?</text>
    <text x="650" y="291" fill="#888">[4, 1]</text>

    <text x="16" y="308" fill="#cca700" font-size="10">&#9888;</text>
    <text x="30" y="308" fill="#cccccc">Invalid value "rectangle" for cursor_shape. Expected: block, beam, underline</text>
    <text x="650" y="308" fill="#888">[6, 15]</text>

    <circle cx="20" cy="322" r="4" fill="#f14c4c"/>
    <text x="30" y="325" fill="#cccccc">Invalid hex color "#xyz123"</text>
    <text x="650" y="325" fill="#888">[8, 17]</text>
  </g>

  <!-- Status bar -->
  <rect y="328" width="800" height="22" fill="#007acc"/>
  <text x="12" y="343" font-family="'Cascadia Code', 'Fira Code', Consolas, monospace" font-size="11" fill="#ffffff">Kitty Config</text>
  <circle cx="200" cy="339" r="4" fill="#f14c4c"/>
  <text x="208" y="343" font-family="'Cascadia Code', 'Fira Code', Consolas, monospace" font-size="11" fill="#ffffff">2</text>
  <text x="224" y="343" fill="#cca700" font-size="10">&#9888;</text>
  <text x="236" y="343" font-family="'Cascadia Code', 'Fira Code', Consolas, monospace" font-size="11" fill="#ffffff">1</text>
  <text x="700" y="343" font-family="'Cascadia Code', 'Fira Code', Consolas, monospace" font-size="11" fill="#ffffff">Ln 4, Col 1</text>
</svg>
