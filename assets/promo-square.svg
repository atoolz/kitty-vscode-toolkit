<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 1080" width="1080" height="1080">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1a1200"/>
      <stop offset="100%" stop-color="#2d2000"/>
    </linearGradient>
    <linearGradient id="iconGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f59e0b"/>
      <stop offset="100%" stop-color="#d97706"/>
    </linearGradient>
    <linearGradient id="accentOrb" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f59e0b" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#f59e0b" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="accentOrb2" x1="100%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#fbbf24" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#d97706" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1080" height="1080" fill="url(#bg)"/>

  <!-- Subtle grid dots -->
  <g opacity="0.05">
    <pattern id="dots" x="0" y="0" width="40" height="40" patternUnits="userSpaceOnUse">
      <circle cx="20" cy="20" r="1" fill="#94a3b8"/>
    </pattern>
    <rect width="1080" height="1080" fill="url(#dots)"/>
  </g>

  <!-- Decorative gradient orbs -->
  <circle cx="540" cy="200" r="350" fill="url(#accentOrb)"/>
  <circle cx="800" cy="900" r="300" fill="url(#accentOrb2)"/>

  <!-- Top accent line -->
  <rect x="0" y="0" width="1080" height="3" fill="#f59e0b" opacity="0.6"/>

  <!-- Icon centered -->
  <g transform="translate(470, 80)">
    <rect width="140" height="140" rx="28" fill="url(#iconGrad)"/>
    <rect x="1.5" y="1.5" width="137" height="137" rx="26" fill="none" stroke="#fbbf24" stroke-width="1.5" opacity="0.3"/>
    <text x="70" y="70" text-anchor="middle" dominant-baseline="central" font-family="'Inter', 'Helvetica Neue', Arial, sans-serif" font-size="58" font-weight="700" fill="#ffffff" letter-spacing="-2">Kt</text>
  </g>

  <!-- Title -->
  <text x="540" y="290" text-anchor="middle" font-family="'Inter', 'Helvetica Neue', Arial, sans-serif" font-size="56" font-weight="800" fill="#ffffff" letter-spacing="-1.5">Kitty Toolkit</text>

  <!-- Subtitle -->
  <text x="540" y="340" text-anchor="middle" font-family="'Inter', 'Helvetica Neue', Arial, sans-serif" font-size="24" font-weight="400" fill="#94a3b8">for VS Code</text>

  <!-- Divider -->
  <rect x="440" y="370" width="200" height="1" fill="#334155"/>

  <!-- Feature list centered -->
  <g font-family="'Inter', 'Helvetica Neue', Arial, sans-serif" font-size="22" fill="#e2e8f0">
    <circle cx="310" cy="418" r="5" fill="#f59e0b"/>
    <text x="330" y="425">Syntax highlighting</text>

    <circle cx="310" cy="468" r="5" fill="#f59e0b"/>
    <text x="330" y="475">100+ config options</text>

    <circle cx="310" cy="518" r="5" fill="#f59e0b"/>
    <text x="330" y="525">Enum &amp; color validation</text>

    <circle cx="310" cy="568" r="5" fill="#f59e0b"/>
    <text x="330" y="575">Map action completions</text>

    <circle cx="310" cy="618" r="5" fill="#f59e0b"/>
    <text x="330" y="625">6 ready-to-use snippets</text>
  </g>

  <!-- Code preview block -->
  <g transform="translate(130, 680)">
    <rect width="820" height="280" rx="12" fill="#1a1200" stroke="#334155" stroke-width="1"/>
    <!-- Window dots -->
    <circle cx="24" cy="22" r="5" fill="#ef4444" opacity="0.7"/>
    <circle cx="44" cy="22" r="5" fill="#eab308" opacity="0.7"/>
    <circle cx="64" cy="22" r="5" fill="#22c55e" opacity="0.7"/>
    <!-- Code lines -->
    <g font-family="'Fira Code', 'Cascadia Code', 'Consolas', monospace" font-size="16">
      <text x="24" y="60" fill="#64748b"># Kitty Terminal</text>
      <text x="24" y="88" fill="#c084fc">font_family</text><text x="140" y="88" fill="#e2e8f0">      FiraCode Nerd Font</text>
      <text x="24" y="116" fill="#c084fc">font_size</text><text x="120" y="116" fill="#e2e8f0">        </text><text x="196" y="116" fill="#fbbf24">12.0</text>
      <text x="24" y="144" fill="#c084fc">cursor_shape</text><text x="152" y="144" fill="#e2e8f0">     </text><text x="196" y="144" fill="#86efac">beam</text>
      <text x="24" y="172" fill="#c084fc">background</text><text x="132" y="172" fill="#e2e8f0">       </text><text x="196" y="172" fill="#86efac">#1a1b26</text>
      <text x="24" y="200" fill="#c084fc">foreground</text><text x="132" y="200" fill="#e2e8f0">       </text><text x="196" y="200" fill="#86efac">#c0caf5</text>
      <text x="24" y="228" fill="#c084fc">tab_bar_style</text><text x="156" y="228" fill="#e2e8f0">    </text><text x="196" y="228" fill="#86efac">powerline</text>
      <text x="24" y="256" fill="#c084fc">map</text><text x="54" y="256" fill="#7dd3fc"> ctrl+shift+c</text><text x="186" y="256" fill="#e2e8f0"> </text><text x="196" y="256" fill="#86efac">copy_to_clipboard</text>
    </g>
    <!-- Autocomplete popup -->
    <g transform="translate(450, 110)">
      <rect width="250" height="120" rx="6" fill="#1e293b" stroke="#f59e0b" stroke-width="1.5"/>
      <rect x="4" y="6" width="242" height="28" rx="4" fill="#f59e0b" opacity="0.2"/>
      <g font-family="'Fira Code', 'Cascadia Code', 'Consolas', monospace" font-size="14" fill="#e2e8f0">
        <text x="14" y="26" fill="#ffffff" font-weight="600">block</text><text x="70" y="26" fill="#64748b" font-size="12">block cursor</text>
        <text x="14" y="54">beam</text><text x="60" y="54" fill="#64748b" font-size="12">beam cursor</text>
        <text x="14" y="82">underline</text><text x="100" y="82" fill="#64748b" font-size="12">underline cursor</text>
      </g>
    </g>
  </g>

  <!-- Bottom bar -->
  <rect x="0" y="1030" width="1080" height="50" fill="#1a1200" opacity="0.7"/>
  <text x="540" y="1062" text-anchor="middle" font-family="'Fira Code', 'Cascadia Code', 'Consolas', monospace" font-size="15" fill="#64748b">github.com/atoolz/kitty-vscode-toolkit</text>
</svg>